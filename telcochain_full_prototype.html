
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#040d1a;--surf:#071628;--surf2:#0b2040;--surf3:#0f2a52;
--border:#1a3a5c;--border2:#1e4a6e;
--cyan:#00e5ff;--green:#00ff88;--purple:#8b5cf6;--amber:#f59e0b;--red:#ef4444;
--text:#c8e6f5;--muted:#4a7a99;--dim:#2a5a7a;
--font-head:'Orbitron',monospace;--font-mono:'JetBrains Mono',monospace;--font-body:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
.scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.015) 2px,rgba(0,229,255,0.015) 4px);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
/* NAV */
.nav{display:flex;align-items:center;gap:0;background:var(--surf);border-bottom:1px solid var(--border);padding:0 16px;height:52px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:var(--font-head);font-size:14px;font-weight:900;color:var(--cyan);letter-spacing:2px;margin-right:24px;white-space:nowrap}
.nav-logo span{color:var(--green)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-tab{font-family:var(--font-body);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:0 14px;height:52px;display:flex;align-items:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.nav-tab:hover{color:var(--text);background:var(--surf2)}
.nav-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.nav-status{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--font-mono);color:var(--green);margin-left:12px;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,255,136,0)}}
/* MAIN */
.main{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}
/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-sm{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:12px}
.card-title{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
/* GRID */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
/* STAT CARDS */
.stat{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.cyan::before{background:var(--cyan)}
.stat.green::before{background:var(--green)}
.stat.purple::before{background:var(--purple)}
.stat.amber::before{background:var(--amber)}
.stat-label{font-size:10px;font-family:var(--font-mono);color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:var(--font-head);font-size:22px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--font-mono)}
.cyan{color:var(--cyan)}
.green{color:var(--green)}
.purple{color:var(--purple)}
.amber{color:var(--amber)}
.red{color:var(--red)}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--font-mono);font-weight:500;letter-spacing:.5px}
.badge-green{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.25)}
.badge-cyan{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.badge-amber{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.badge-purple{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.25)}
/* BUTTONS */
.btn{font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.5px;padding:8px 18px;border-radius:6px;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--cyan);color:#040d1a}
.btn-primary:hover{background:#33ecff;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
.btn-outline:hover{background:rgba(0,229,255,.1)}
.btn-green{background:var(--green);color:#040d1a}
.btn-green:hover{background:#33ffaa;transform:translateY(-1px)}
.btn-sm{padding:5px 12px;font-size:11px}
/* CHARTS */
.chart-wrap{width:100%;position:relative}
/* TABLES */
.tx-table{width:100%;border-collapse:collapse;font-size:12px}
.tx-table th{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;font-weight:500}
.tx-table td{padding:10px;border-bottom:1px solid var(--border);font-family:var(--font-mono);color:var(--text)}
.tx-table tr:hover td{background:var(--surf2)}
/* PROGRESS */
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
/* TOGGLE */
.toggle{position:relative;width:42px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:.3s}
.toggle input:checked+.toggle-track{background:var(--green)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:white;transition:.3s;pointer-events:none}
.toggle input:checked~.toggle-thumb{left:23px}
/* NOTIFICATION */
.notif{background:var(--surf2);border:1px solid var(--cyan);border-left:3px solid var(--cyan);border-radius:6px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;animation:slideIn .4s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heatmap-cell{height:20px;border-radius:3px}
/* IoT */
.iot-screen{background:#020710;border:2px solid var(--cyan);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.iot-screen::before{content:'TCT IoT v2.4';position:absolute;top:8px;left:12px;font-family:var(--font-mono);font-size:9px;color:var(--dim);letter-spacing:2px}
.iot-screen::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,229,255,.03) 0%,transparent 100%);pointer-events:none}
/* PRICE CHART LINE */
.spark{stroke:var(--cyan);fill:none;stroke-width:1.5}
.spark-area{fill:rgba(0,229,255,.08)}
/* OPERATOR */
.node-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px}
.node{height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--font-mono);font-weight:700;border:1px solid transparent;cursor:pointer;transition:.2s}
.node:hover{transform:scale(1.1)}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* SECTION HEADER */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:2px;text-transform:uppercase}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0}
/* MARKET ORDER BOOK */
.order{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(26,58,92,.5);font-family:var(--font-mono);font-size:11px}
/* INPUT */
.inp{background:var(--surf3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--font-mono);font-size:13px;padding:9px 12px;width:100%;outline:none}
.inp:focus{border-color:var(--cyan)}
/* LIVE TAG */
.live{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
/* ALERT BANNER */
.alert{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:8px;margin-bottom:12px}
/* ROAMING MAP */
.route-line{stroke:var(--cyan);stroke-width:1.5;stroke-dasharray:4,3;fill:none;animation:dash 2s linear infinite}
@keyframes dash{to{stroke-dashoffset:-14}}
@keyframes carMove{0%{transform:translateX(0)}100%{transform:translateX(140px)}}
.car-anim{animation:carMove 4s linear infinite alternate}
</style>

function setPage(page) {

function buildNodeHeatmap(){
  const g=$('nodeHeat');if(!g)return;
  const loads=['idle','low','low','normal','normal','normal','high','high','critical'];
  const colors={'idle':'rgba(26,58,92,0.8)','low':'rgba(0,255,136,0.15)','normal':'rgba(0,255,136,0.3)','high':'rgba(245,158,11,0.4)','critical':'rgba(239,68,68,0.5)'};
  let html='';
  for(let i=0;i<48;i++){
    const load=loads[Math.floor(Math.random()*loads.length)];
    html+=`<div class="node" style="background:${colors[load]};border-color:${colors[load].replace('0.','0.')};color:rgba(200,230,245,0.7)" title="Node ${i+1}:${load}">${i+1}</div>`;
  }
  g.innerHTML=html;
